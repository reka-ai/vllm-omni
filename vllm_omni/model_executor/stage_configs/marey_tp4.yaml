# Stage config for Marey text-to-video using tensor parallel (TP=4) for the DiT
# instead of sequence/Ulysses parallel (SP=4). Same GPU budget (6 total).
#
#   Stage 0 — text encoders (UL2 + CLIP + ByT5)          [1 GPU, TP=1]
#   Stage 1 — Marey DiT denoising loop                    [4 GPUs, TP=4]
#   Stage 2 — opensora spatiotemporal VAE decoder         [1 GPU, TP=1]
#
# Used to compare output quality against marey.yaml (SP=4) and to exercise the
# QKVParallelLinear path in MareyFluxAttention. Start the server with
# run_server_tp4.sh (which avoids passing --ulysses-degree).

stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: text_encoder
      model_arch: MareyTextEncoder
      hf_config_path: google/ul2
      tokenizer: google/ul2
      hf_overrides:
        architectures: [MareyTextEncoder]
        is_encoder_decoder: false
        model_type: gpt2
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      engine_output_type: latent
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.15
      max_num_batched_tokens: 512
      max_model_len: 512
    is_comprehension: true
    final_output: false
    default_sampling_params:
      temperature: 0.0
      top_k: 1
      max_tokens: 1
      detokenize: false
      seed: 42

  - stage_id: 1
    stage_type: diffusion
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.marey.text2diffusion
    runtime:
      devices: "1,2,3,4"
      max_batch_size: 1
    engine_args:
      model_stage: dit
      model_class_name: MareyDitPipeline
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      parallel_config:
        ulysses_degree: 1
        tensor_parallel_size: 4
    engine_input_source: [0]
    final_output: false
    is_comprehension: false
    default_sampling_params:
      seed: 42
      guidance_scale: 7.5
      num_inference_steps: 100

  - stage_id: 2
    stage_type: diffusion
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.marey.diffusion2vae
    runtime:
      devices: "5"
      max_batch_size: 1
    engine_args:
      model_stage: vae
      model_class_name: MareyVaePipeline
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
    engine_input_source: [1]
    final_output: true
    final_output_type: video
    is_comprehension: false
    default_sampling_params:
      seed: 42

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

  edges:
    - from: 0
      to: 1
      window_size: -1
    - from: 1
      to: 2
      window_size: -1
