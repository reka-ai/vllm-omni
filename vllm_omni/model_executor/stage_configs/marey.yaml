# Stage config for Marey text-to-video (3 stages, 6 GPUs):
#   Stage 0 — text encoders (UL2 + CLIP + ByT5)          [1 GPU ]
#   Stage 1 — Marey DiT denoising loop                    [4 GPUs, SP via ulysses]
#   Stage 2 — opensora spatiotemporal VAE decoder         [1 GPU ]
#
# Stage-to-stage data transfer goes in-memory through the orchestrator
# (connectors are only needed for KV-cache transfer, CFG companions, or
# async_chunk streaming — none of which apply to Marey v1). The
# shared-memory connector stub below is left commented out so a future
# autoregressive-text extension can enable KV transfer by flipping
# need_send_cache / need_recv_cache and pointing stage-0/stage-1 at it.

stage_args:
  - stage_id: 0
    stage_type: llm
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: text_encoder
      model_arch: MareyTextEncoder
      hf_overrides:
        architectures: [MareyTextEncoder]
      worker_type: generation
      scheduler_cls: vllm_omni.core.sched.omni_generation_scheduler.OmniGenerationScheduler
      engine_output_type: latent
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.15
      max_num_batched_tokens: 512
      max_model_len: 1024
    is_comprehension: true
    final_output: false
    default_sampling_params:
      # Stage-0 placeholder sampling params; the encoders don't generate.
      temperature: 0.0
      top_k: 1
      max_tokens: 1
      detokenize: false
      seed: 42

  - stage_id: 1
    stage_type: diffusion
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.marey.text2diffusion
    runtime:
      devices: "1,2,3,4"
      max_batch_size: 1
    engine_args:
      model_stage: dit
      model_class_name: MareyDitPipeline
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      parallel_config:
        ulysses_degree: 4
    engine_input_source: [0]
    final_output: false
    is_comprehension: false
    default_sampling_params:
      seed: 42
      guidance_scale: 7.5
      num_inference_steps: 100

  - stage_id: 2
    stage_type: diffusion
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.marey.diffusion2vae
    runtime:
      devices: "5"
      max_batch_size: 1
    engine_args:
      model_stage: vae
      model_class_name: MareyVaePipeline
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
    engine_input_source: [1]
    final_output: true
    final_output_type: video
    is_comprehension: false
    default_sampling_params:
      seed: 42

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

  # Connectors are declared but unused for baseline Marey (no KV transfer,
  # no async_chunk). Leave the shared-memory connector here so a future
  # autoregressive-text extension can opt in by setting
  # engine_args.omni_kv_config.need_send_cache=true on stage 0 and
  # need_recv_cache=true on stage 1, and pointing them at this connector.
  # connectors:
  #   shared_memory_connector:
  #     name: SharedMemoryConnector
  #     extra:
  #       shm_threshold_bytes: 65536

  edges:
    - from: 0
      to: 1
      window_size: -1
    - from: 1
      to: 2
      window_size: -1
