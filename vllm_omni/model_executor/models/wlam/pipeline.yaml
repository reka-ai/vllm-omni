model_type: wlam

stages:
  - stage_id: 0
    model_stage: ar
    stage_type: llm
    is_comprehension: true
    input_sources: []
    worker_type: ar
    scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
    runtime:
      devices: "0"
    engine_args:
      model_arch: WLAMForConditionalGeneration
      hf_overrides:
        architectures: [WLAMForConditionalGeneration]
        model_type: wlam
      max_num_seqs: 1
      max_num_batched_tokens: 32768
      max_model_len: 32768
      gpu_memory_utilization: 0.45
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      engine_output_type: text
      omni_kv_config:
        need_send_cache: true
        kv_transfer_criteria:
          type: prefill_finished
    final_output: false
    default_sampling_params:
      temperature: 0.0
      top_k: 1
      max_tokens: 1
      detokenize: false

  - stage_id: 1
    model_stage: diffusion
    stage_type: diffusion
    input_sources: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.wlam.ar2diffusion
    runtime:
      devices: "0"
    engine_args:
      model_class_name: WLAMDiffusionPipeline
      max_num_seqs: 1
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      omni_kv_config:
        need_recv_cache: true
    final_output: false
    default_sampling_params:
      seed: 42
      num_inference_steps: 50

  - stage_id: 2
    model_stage: vae
    stage_type: diffusion
    input_sources: [1]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.wlam.diffusion2vae
    runtime:
      devices: "0"
    engine_args:
      model_class_name: WLAMVaePipeline
      max_num_seqs: 1
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
    final_output: true
    final_output_type: video
    default_sampling_params:
      seed: 42

connectors:
  shared_memory_connector:
    name: SharedMemoryConnector
    extra:
      shm_threshold_bytes: 65536

edges:
  - from: 0
    to: 1
    window_size: -1
  - from: 1
    to: 2
    window_size: -1
